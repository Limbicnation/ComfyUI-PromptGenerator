[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = nodes
omit =
    */tests/*
    */adapters/*
    */__pycache__/*

[coverage:report]
fail_under = 70
show_missing = True
skip_covered = False
