name: Publish to ComfyUI Registry

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate version match
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          TOML_VERSION=$(grep "version" pyproject.toml | head -1 | cut -d'"' -f2)
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $TOML_VERSION"
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "❌ Tag v$TAG_VERSION doesn't match pyproject.toml version $TOML_VERSION"
            exit 1
          fi
          echo "✅ Version validation passed"

      - name: Install comfy-cli
        run: |
          pip install comfy-cli

      - name: Disable telemetry (suppresses interactive opt-in prompt in CI)
        run: |
          comfy --skip-prompt tracking disable

      - name: Validate node metadata
        run: |
          comfy --skip-prompt node validate

      - name: Publish to Registry
        env:
          REGISTRY_ACCESS_TOKEN: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
        run: |
          if [ -z "$REGISTRY_ACCESS_TOKEN" ]; then
            echo "::error::REGISTRY_ACCESS_TOKEN secret is not set on this repository."
            echo "Create a Personal Access Token at https://registry.comfy.org/ (Settings → Create new token)"
            echo "then add it via: gh secret set REGISTRY_ACCESS_TOKEN --body '<token>'"
            exit 1
          fi
          comfy --skip-prompt node publish --token "$REGISTRY_ACCESS_TOKEN"
